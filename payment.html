<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>सदस्यता शुल्क भुगतान</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container py-5">

<h2 class="text-center text-success">
सदस्यता शुल्क भुगतान
</h2>

<p class="text-center">
कृपया नीचे दिए गए QR Code को स्कैन करके भुगतान करें।
</p>

<div class="text-center">

<img src="assets/payment-qr.png"
class="img-fluid"
style="max-width:280px;">

</div>

<div class="card mt-4 shadow p-4">

<div class="mb-3">
<label>UPI ID</label>
<input type="text"
class="form-control"
value="yourupi@upi"
readonly>
</div>

<div class="mb-3">
<label>Transaction ID</label>
<input type="text"
class="form-control"
placeholder="Transaction ID दर्ज करें">
</div>

<div class="mb-3">
<label>Payment Screenshot</label>
<input type="file"
class="form-control">
</div>

<button class="btn btn-success w-100">
भुगतान की जानकारी जमा करें
</button>

</div>

</div>

</body>
</html>

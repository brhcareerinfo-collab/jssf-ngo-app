<!DOCTYPE html>
<html lang="hi">
<head>

<title>ऑनलाइन सदस्यता | जीवन सेतु सहायता फाउंडेशन</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<body>

<div class="container py-5">

</div>

<div class="col-md-6 mb-3">
<label>मोबाइल नंबर *</label>
<input type="tel" id="mobile" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>ईमेल</label>
<input type="email" id="email" class="form-control">
</div>

<div class="col-md-6 mb-3">

<input type="date" id="dob" class="form-control" required>

<select id="gender" class="form-control">
<option>पुरुष</oपुरुष>

<div class="col-12 mb-3">
<inputttl>पूरा पता *</label>

<div clasdivcol-md-6 mb-3">

</div>

<div class="col-md-6col-md-6<label>जिला *</label>
<input type="text" id="district" class="form-control">
</div>

<div class="col-mlabelbel>पासपोर्ट साइज फोटो *</label>
<input type="file" class="form-control">
</div>

<div class="col-md-6 mb-3">
    <label>पासपोर्ट साइज फोटो *</label>
    <input type="file" id="photo" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
    <label>आधार कार्ड (वैकल्पिक)</label>
    <input type="file" id="aadhaar" class="form-control">
</div>
<label>जिस पद के लिए आवेदन कर रहे हैं *</label>

<select class="form-select" id="post" onchange="showFee()">

<option value="">-- पद चुनें --</option>

<option value="100">सामान्य सदस्य</option>

<option value="500">सक्रिय सदस्य</option>

<option value="200">स्वयंसेवक</option>

<option value="3000">ब्लॉक अध्यक्ष<labelon>

<option value="5000">तहसील अध्यक्ष</option>

<option value="7000">जिला अध्यक्ष</option>

<optioptionue="11000">प्रदेश पदाधिकारी</option>

</select>

</div>

<div class="col-md-6 mb-3">

<input type="text" id="fee" class="form-control" readonly>
    </div>

<div class="col-12 text-cecol-12t-4">

</form>
<script>
function showFee() {
    const post = document.getElementById("post");
    const fee = document.getElementById("fee");
    fee.value = post.value;
}
</script>

<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ऑनलाइन सदस्यता | जीवन सेतु सहायता फाउंडेशन</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container py-5">

<h2 class="text-center text-success mb-4">
जीवन सेतु सहायता फाउंडेशन
</h2>

<h4 class="text-center mb-5">
ऑनलाइन सदस्यता आवेदन
</h4>

<form>

<div class="row">

<div class="col-md-6 mb-3">
<label>पूरा नाम *</label>
<input type="text" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>पिता / पति का नाम *</label>
<input type="text" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>मोबाइल नंबर *</label>
<input type="tel" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>ईमेल</label>
<input type="email" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>जन्मतिथि *</label>
<input type="date" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>लिंग *</label>

<select class="form-control">
<option>पुरुष</option>
<option>महिला</option>
<option>अन्य</option>
</select>

</div>

<div class="col-12 mb-3">
<label>पूरा पता *</label>
<textarea class="form-control" rows="3"></textarea>
</div>

<div class="col-md-6 mb-3">
<label>राज्य *</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>जिला *</label>
<input type="text" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>पासपोर्ट साइज फोटो *</label>
<input type="file" class="form-control">
</div>

<div class="col-md-6 mb-3">
<label>आधार कार्ड (वैकल्पिक)</label>
<input type="file" class="form-control">
</div>

</div>

</form>

</div>
<div class="col-md-6 mb-3">
<label>जिस पद के लिए आवेदन कर रहे हैं *</label>

<select class="form-select" id="post" onchange="showFee()">

<option value="">-- पद चुनें --</option>

<option value="100">सामान्य सदस्य</option>

<option value="500">सक्रिय सदस्य</option>

<option value="200">स्वयंसेवक</option>

<option value="3000">ब्लॉक अध्यक्ष</option>

<option value="5000">तहसील अध्यक्ष</option>

<option value="7000">जिला अध्यक्ष</option>

<option value="11000">प्रदेश पदाधिकारी</option>

</select>

</div>

<div class="col-md-6 mb-3">

<label>सदस्यता शुल्क</label>

<input type="text" id="fee" class="form-control" readonly>

</div>
</body>
</html>

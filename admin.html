<!DOCTYPE html>
<html lang="hi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JSSF Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f4f7fa;
}

.header{
background:#198754;
color:white;
padding:15px;
border-radius:10px;
text-align:center;
margin-bottom:20px;
}

.card-box{
border-radius:12px;
padding:15px;
text-align:center;
color:white;
font-weight:bold;
margin-bottom:15px;
}

.total{background:#0d6efd;}
.approved{background:#198754;}
.pending{background:#ffc107;color:black;}
.rejected{background:#dc3545;}
.collection{background:#6f42c1;}

.table{
background:white;
border-radius:10px;
overflow:hidden;
}

.search-box{
margin-bottom:15px;
}

</style>

</head>

<body>

<div class="container py-3">

<div class="header">

<h2>Jeevan Setu Sahayata Foundation</h2>

<h5>Admin Dashboard</h5>

</div>

<div class="row">

<div class="col-6 col-md-2">
<div class="card-box total">
<h3 id="totalMembers">0</h3>
Total Members
</div>
</div>

<div class="col-6 col-md-2">
<div class="card-box approved">
<h3 id="approvedMembers">0</h3>
Approved
</div>
</div>

<div class="col-6 col-md-2">
<div class="card-box pending">
<h3 id="pendingMembers">0</h3>
Pending
</div>
</div>

<div class="col-6 col-md-2">
<div class="card-box rejected">
<h3 id="rejectedMembers">0</h3>
Rejected
</div>
</div>

<div class="col-12 col-md-4">
<div class="card-box collection">
<h3 id="totalCollection">₹0</h3>
Total Collection
</div>
</div>

</div>

<input
type="text"
id="searchInput"
class="form-control search-box"
placeholder="🔍 Search Member Name / Mobile / Member ID">

<table class="table table-bordered table-hover">

<thead class="table-success">

<tr>

<th>Member ID</th>
<th>नाम</th>
<th>मोबाइल</th>
<th>पद</th>
<th>शुल्क</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="memberTable">

</tbody>

</table>
<tbody id="memberTable">

</tbody>

</table>
    
</div>

<script type="module" src="admin.js"></script>
</div>

<script type="module" src="admin.js"></script>

</body>
</html>

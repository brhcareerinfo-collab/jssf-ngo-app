<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSSF Member ID Card</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#e9ecef;
font-family:Arial,sans-serif;
}

.id-card{

width:340px;
margin:30px auto;
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 8px 25px rgba(0,0,0,.25);

}

.header{

background:#198754;
color:white;
text-align:center;
padding:12px;

}

.logo{

width:70px;
height:70px;
border-radius:50%;
background:white;
padding:4px;
margin-bottom:6px;

}

.header h4{

margin:0;
font-size:18px;

}

.header p{

margin:0;
font-size:11px;

}

.photo{

width:100px;
height:100px;
border-radius:50%;
border:3px solid #198754;
display:block;
margin:15px auto;
object-fit:cover;

}

.details{

padding:15px;

}

.details table{

width:100%;

}

.details td{

padding:6px;
font-size:14px;

}

.footer{

background:#198754;
color:white;
text-align:center;
padding:10px;
font-size:12px;

}

.buttons{

text-align:center;
margin:20px;

}

</style>

</head>

<body>

<div class="id-card">

<div class="header">

<img src="assets/logo.png" class="logo">

<h4>Jeevan Setu Sahayata Foundation</h4>

<p>MEMBER IDENTITY CARD</p>

</div>

<img
id="memberPhoto"
src="https://via.placeholder.com/100"
class="photo">

<div class="details">

<table class="table table-sm">

<tr>
<td><b>Name</b></td>
<td id="fullName">-</td>
</tr>

<tr>
<td><b>Member ID</b></td>
<td id="memberId">-</td>
</tr>

<tr>
<td><b>Post</b></td>
<td id="post">-</td>
</tr>

<tr>
<td><b>Mobile</b></td>
<td id="mobile">-</td>
</tr>

<tr>
<td><b>Status</b></td>
<td id="status">Approved</td>
</tr>

</table>

</div>

<div class="footer">

JSSF • www.jssfoundation.co.in

</div>

</div>

<div class="buttons">

<button
class="btn btn-success"
onclick="window.print()">

🖨 Print

</button>

<a href="admin.html"
class="btn btn-primary">

⬅ Back

</a>

</div>

<script type="module" src="id-card.js"></script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JSSF NGO App</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f8fc;
}

header{
background:#0A3D91;
color:white;
padding:20px;
text-align:center;
}

nav{
display:flex;
justify-content:space-around;
background:#08306b;
padding:12px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
}

.hero{
text-align:center;
padding:40px 20px;
}

.hero h2{
color:#0A3D91;
margin-bottom:15px;
}

.btn{
background:#28a745;
color:white;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
display:inline-block;
margin-top:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.15);
}
</style>

</head>

<body>

<header>
<h1>Jeevan Setu Sahayata Foundation</h1>
<p>Serving Humanity With Dedication</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">About</a>
<a href="#">Membership</a>
<a href="#">Donation</a>
<a href="#">Contact</a>
</nav>

<section class="hero">
<h2>Welcome to JSSF</h2>
<p>Health • Education • Humanity • Social Service</p>

<a href="#" class="btn">Join Membership</a>
</section>

<div class="cards">

<div class="card">
<h3>👥 Membership</h3>
</div>

<div class="card">
<h3>❤️ Donation</h3>
</div>

<div class="card">
<h3>🩺 Health Camp</h3>
</div>

<div class="card">
<h3>🤝 Volunteer</h3>
</div>

</div>

</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f5f5f5;
}

.card{
max-width:700px;
margin:auto;
border-radius:15px;
}

h2{
font-weight:bold;
}

.btn{
margin-top:10px;
}
</style>

</head>

<body>

<div class="container py-4">

<h2 class="text-center text-success mb-4">
Jeevan Setu Sahayata Foundation
</h2>

<div class="card shadow p-4">

<h4 class="text-center mb-4">
Member Details
</h4>

<table class="table table-bordered">

<tr>
<th width="35%">Member ID</th>
<td id="memberId"></td>
</tr>

<tr>
<th>नाम</th>
<td id="fullName"></td>
</tr>

<tr>
<th>पिता का नाम</th>
<td id="fatherName"></td>
</tr>

<tr>
<th>मोबाइल</th>
<td id="mobile"></td>
</tr>

<tr>
<th>ईमेल</th>
<td id="email"></td>
</tr>

<tr>
<th>जन्मतिथि</th>
<td id="dob"></td>
</tr>

<tr>
<th>लिंग</th>
<td id="gender"></td>
</tr>

<tr>
<th>पता</th>
<td id="address"></td>
</tr>

<tr>
<th>जिला</th>
<td id="district"></td>
</tr>

<tr>
<th>राज्य</th>
<td id="state"></td>
</tr>

<tr>
<th>आधार</th>
<td id="aadhaar"></td>
</tr>

<tr>
<th>पद</th>
<td id="post"></td>
</tr>

<tr>
<th>शुल्क</th>
<td>₹<span id="fee"></span></td>
</tr>

<tr>
<th>Status</th>
<td id="status"></td>
</tr>

</table>

<div class="text-center">

<button class="btn btn-success" onclick="window.print()">
🖨 Print
</button>

<button class="btn btn-primary"
onclick="history.back()">
⬅ Back
</button>

</div>

</div>

</div>

<script type="module" src="member-details.js"></script>

</body>
</html>
